<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>NEO THE AGENCY</title>
    <script type="text/javascript">
      // GitHub Pages SPA-fallback (rafgraph/spa-github-pages pattern).
      // Repo is published at /Neo_Homepage_Apple/ — `pathSegmentsToKeep = 1`
      // preserves that segment; everything beyond becomes a query string
      // that index.html parses back into a real path.
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname
            .split("/")
            .slice(0, 1 + pathSegmentsToKeep)
            .join("/") +
          "/?/" +
          l.pathname
            .slice(1)
            .split("/")
            .slice(pathSegmentsToKeep)
            .join("/")
            .replace(/&/g, "~and~") +
          (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
