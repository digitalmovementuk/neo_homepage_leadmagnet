<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="720" viewBox="0 0 1600 720" role="img" aria-labelledby="title desc">
  <title id="title">NEO Logo 08 - Prism</title>
  <desc id="desc">A gradient prism version with a folded N mark and clean wordmark.</desc>
  <defs>
    
      <linearGradient id="neoPrism" x1="100" y1="100" x2="520" y2="520" gradientUnits="userSpaceOnUse">
        <stop offset="0" stop-color="#0037D8"/>
        <stop offset="0.58" stop-color="#315CFF"/>
        <stop offset="1" stop-color="#FF7A45"/>
      </linearGradient>
      
  </defs>
  
      <g transform="translate(110 116)">
        <polygon points="0,420 88,420 152,0 64,0" fill="url(#neoPrism)"/>
        <polygon points="282,420 370,420 434,0 346,0" fill="#0026A3"/>
        <polygon points="104,0 192,0 334,420 246,420" fill="#FF7A45"/>
      </g>
      <text x="626" y="318" fill="#26272F" font-family="Geist, Helvetica Neue, Arial, sans-serif" font-size="174" font-weight="900" letter-spacing="-7">NEO</text>
      <text x="640" y="410" fill="#0037D8" font-family="Geist, Helvetica Neue, Arial, sans-serif" font-size="45" font-weight="850" letter-spacing="12">THE AGENCY</text>
      <text x="642" y="474" fill="#66636D" font-family="Geist, Helvetica Neue, Arial, sans-serif" font-size="29" font-weight="600">Performance systems for ambitious brands</text>
      
