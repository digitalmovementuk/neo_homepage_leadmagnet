    <!-- GitHub Pages SPA-fallback decode (rafgraph/spa-github-pages).
         404.html redirects unknown URLs to /?/path encoded — this script
         flips that back into a real history entry so React Router can
         match the route on first paint. -->
    <script type="text/javascript">
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) { return s.replace(/~and~/g, "&"); })
            .join("?");
          window.history.replaceState(
            null,
            "",
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      })(window.location);
    </script>
