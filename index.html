<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#FF7A45" />

    <!-- GitHub Pages SPA-fallback decode (rafgraph/spa-github-pages).
         404.html redirects unknown URLs to /?/path encoded — this script
         flips that back into a real history entry so React Router can
         match the route on first paint. -->
    <script type="text/javascript">
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) { return s.replace(/~and~/g, "&"); })
            .join("?");
          window.history.replaceState(
            null,
            "",
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      })(window.location);
    </script>

    <title>NEO THE AGENCY — Neue Website + Google Seite 1 in 90 Tagen</title>
    <meta
      name="description"
      content="Wir bauen Websites, die ranken, überzeugen und Anfragen bringen. SEO, Google Ads, Social Media und Webentwicklung aus einer Hand — für den deutschen Markt."
    />
    <link rel="canonical" href="https://www.neotheagency.de/" />

    <!-- LCP: preload the hero poster as a high-priority image. Uses a
         responsive WebP set so mobile pulls a 31KB asset, desktop a 67KB asset.
         The same image is reused as the <video poster> + CSS background-image
         on the SlideVideo, so it never re-fetches. -->
    <link
      rel="preload"
      as="image"
      href="/brand/hero-poster-mobile.webp"
      imagesrcset="/brand/hero-poster-mobile.webp 800w, /brand/hero-poster.webp 1400w"
      imagesizes="100vw"
      type="image/webp"
      fetchpriority="high"
    />

    <link rel="icon" type="image/svg+xml" href="/brand/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/brand/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/brand/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/brand/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="apple-mobile-web-app-title" content="NEO THE AGENCY" />
    <meta name="application-name" content="NEO THE AGENCY" />

    <!-- Open Graph (Facebook, WhatsApp, LinkedIn, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.neotheagency.de/" />
    <meta property="og:site_name" content="NEO THE AGENCY" />
    <meta property="og:title" content="NEO THE AGENCY — Neue Website + Google Seite 1 in 90 Tagen" />
    <meta
      property="og:description"
      content="Wir bauen Websites, die ranken, überzeugen und Anfragen bringen. SEO, Google Ads, Social Media und Webentwicklung aus einer Hand."
    />
    <meta property="og:locale" content="de_DE" />
    <meta property="og:image" content="https://www.neotheagency.de/brand/og-cover.jpg" />
    <meta property="og:image:secure_url" content="https://www.neotheagency.de/brand/og-cover.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="2400" />
    <meta property="og:image:height" content="1260" />
    <meta property="og:image:alt" content="NEO THE AGENCY — Digitalagentur für Websites, SEO, Google Ads und Social Media" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="NEO THE AGENCY — Neue Website + Google Seite 1 in 90 Tagen" />
    <meta
      name="twitter:description"
      content="Wir bauen Websites, die ranken, überzeugen und Anfragen bringen. SEO, Google Ads, Social Media und Webentwicklung aus einer Hand."
    />
    <meta name="twitter:image" content="https://www.neotheagency.de/brand/og-cover.jpg" />
    <meta name="twitter:image:alt" content="NEO THE AGENCY — Digitalagentur für Websites, SEO, Google Ads und Social Media" />

    <!-- Fonts. Preconnect for TLS warm-up; the stylesheet itself is loaded
         non-render-blocking via media swap so it never delays the LCP frame. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500&display=swap"
      />
    </noscript>

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "LocalBusiness",
        "name": "NEO THE AGENCY",
        "alternateName": "Neo Agency",
        "description": "Deutsche Digitalagentur für planbares Wachstum. SEO, Google Ads, Social Media, Websites.",
        "url": "https://www.neotheagency.de/",
        "logo": "https://www.neotheagency.de/brand/favicon-512.png",
        "image": "https://www.neotheagency.de/brand/og-cover.jpg",
        "telephone": "+49 30 123 4567",
        "email": "kontakt@neo-agency.de",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "Hardenbergstraße 1",
          "addressLocality": "Berlin",
          "postalCode": "10623",
          "addressCountry": "DE"
        },
        "aggregateRating": {
          "@type": "AggregateRating",
          "ratingValue": "5.0",
          "reviewCount": "20"
        },
        "sameAs": []
      }
    </script>
  </head>
  <body>
    <a class="skip-link" href="#main">Zum Inhalt springen</a>

    <!-- LCP shell. This <img> paints before the JS bundle parses, so Lighthouse
         records LCP against the WebP poster (~31KB on mobile, ~67KB on desktop)
         instead of waiting for React to mount. Once React hydrates, the
         SlideVideo overlays this image; we then hide it so it doesn't burn CPU
         compositing under the live video. -->
    <img
      id="lcp-shell"
      src="/brand/hero-poster-mobile.webp"
      srcset="/brand/hero-poster-mobile.webp 800w, /brand/hero-poster.webp 1400w"
      sizes="100vw"
      alt=""
      aria-hidden="true"
      fetchpriority="high"
      decoding="async"
      style="position:fixed;inset:0;width:100vw;height:100svh;object-fit:cover;z-index:0;background:#05040A"
    />
    <div id="root" style="position:relative;z-index:1"></div>
    <script>
      // Drop the LCP shell once React paints the real hero. requestIdleCallback
      // gives us a frame after the SlideVideo has rendered + the poster
      // attribute has loaded, so the visual swap is invisible.
      window.addEventListener("load", function () {
        var fade = function () {
          var img = document.getElementById("lcp-shell");
          if (!img) return;
          img.style.transition = "opacity .25s ease";
          img.style.opacity = "0";
          setTimeout(function () { img && img.parentNode && img.parentNode.removeChild(img); }, 320);
        };
        ("requestIdleCallback" in window)
          ? window.requestIdleCallback(fade, { timeout: 1500 })
          : setTimeout(fade, 800);
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
